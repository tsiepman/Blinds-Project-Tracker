<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ART Blinds Project Tracker</title>
<style>
:root{--bg:#f9f8f6;--surface:#fff;--s2:#f4f3f0;--border:rgba(0,0,0,.1);--bmd:rgba(0,0,0,.18);--text:#1a1a18;--t2:#6b6b67;--t3:#9b9b96;--blue:#1a6bbf;--bbg:#e8f0fa;--green:#2d7a3a;--gbg:#e6f4e8;--amber:#8a5500;--abg:#fdf3dc;--red:#b03030;--rbg:#fdeaea;--r:8px;--rl:12px;--sh:0 1px 4px rgba(0,0,0,.07),0 0 0 .5px rgba(0,0,0,.07)}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--s2:#2c2c2e;--border:rgba(255,255,255,.1);--bmd:rgba(255,255,255,.18);--text:#f0efec;--t2:#a0a09c;--t3:#68686a;--blue:#5da0e8;--bbg:rgba(93,160,232,.12);--green:#5ab868;--gbg:rgba(90,184,104,.12);--amber:#e0a840;--abg:rgba(224,168,64,.12);--red:#e06060;--rbg:rgba(224,96,96,.12);--sh:0 1px 4px rgba(0,0,0,.3),0 0 0 .5px rgba(255,255,255,.06)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:24px 16px 80px}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.app-title{font-size:20px;font-weight:600}
.app-title span{font-size:13px;font-weight:400;color:var(--t2);margin-left:8px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.user-badge{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--bbg);color:var(--blue)}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 14px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--s2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{opacity:.88}
.btn-sm{font-size:12px;padding:5px 10px}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.art-sc{background:var(--surface);border-radius:var(--rl);box-shadow:var(--sh);padding:14px 16px;text-align:center}
.art-sn{font-size:26px;font-weight:600}
.art-sl{font-size:11px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:16px}
.tab{font-size:13px;padding:9px 18px;border:none;background:none;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.art-fc{font-size:11px;padding:4px 12px;border-radius:20px;border:.5px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;font-family:inherit}
.fc.active{background:var(--s2);color:var(--text);border-color:var(--bmd)}
.project-list{display:flex;flex-direction:column;gap:10px}
.empty-state{text-align:center;padding:48px 24px;color:var(--t2);font-size:13px}
.art-pc{background:var(--surface);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden}
.art-ch{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.ch:hover{background:var(--s2)}
.art-cl{flex:1;min-width:0}
.art-cn{font-size:14px;font-weight:600}
.art-cm{font-size:12px;color:var(--t2);margin-top:3px}
.art-cr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.chv{font-size:18px;color:var(--t3);transition:transform .2s;display:inline-block}
.chv.open{transform:rotate(180deg)}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;font-weight:500}
.art-bs{background:var(--s2);color:var(--t2);border:.5px solid var(--border)}
.art-br{background:var(--gbg);color:var(--green)}
.art-bi{background:var(--abg);color:var(--amber)}
.art-bo{background:var(--bbg);color:var(--blue)}
.art-pb{height:3px;background:var(--s2)}
.art-pf{height:100%;background:var(--blue);transition:width .4s}
.dp{display:none;padding:0 16px 16px;border-top:.5px solid var(--border)}
.dp.open{display:block}
.art-dpi{padding-top:16px}
.itags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.art-it{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--abg);color:var(--amber)}
.art-fb{background:var(--s2);border-radius:var(--r);padding:14px;margin-bottom:14px;border:.5px solid var(--border)}
.fb h4,.ds h4,.rs h4,.tl h4,.pob h4{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.fc2{font-size:14px;font-weight:600;margin-bottom:4px;min-height:20px}
.fc2.empty{font-weight:400;color:var(--amber);font-style:italic}
.fsrc{font-size:11px;color:var(--t3);margin-bottom:12px}
.fins{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.art-fi{flex:1;min-width:180px;font-size:13px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);font-family:inherit}
.art-fw{font-size:13px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:560px){.detail-grid{grid-template-columns:1fr}.summary-bar{grid-template-columns:repeat(2,1fr)}}
.art-ds{background:var(--s2);border-radius:var(--r);padding:12px;border:.5px solid var(--border)}
.art-fr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--border)}
.fr:last-child{border-bottom:none}
.art-fl{font-size:12px;color:var(--t2)}
.art-fv{font-size:12px;font-weight:600;text-align:right;max-width:60%}
.art-fv.ok{color:var(--green)}
.art-fv.pend{color:var(--amber)}
.art-rs{margin-bottom:14px}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;margin-bottom:8px}
.rc{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s2);border-radius:var(--r);border:.5px solid var(--border)}
.rn{font-size:12px;flex:1}
.rd{display:flex;gap:4px}
.dot{width:9px;height:9px;border-radius:50%;border:.5px solid var(--bmd);background:var(--surface)}
.dot.m1{background:#1a6bbf;border-color:#1a6bbf}
.dot.m2{background:#2d7a3a;border-color:#2d7a3a}
.pob{background:var(--s2);border-radius:var(--r);padding:12px;margin-bottom:14px;border:.5px solid var(--border)}
.poc{font-size:14px;font-weight:600;margin-bottom:8px}
.poc.empty{font-weight:400;color:var(--t3);font-style:italic}
.poi{display:flex;gap:6px;align-items:center}
.pi{flex:1;font-size:13px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);font-family:inherit}
.tl{margin-bottom:14px}
.tle{display:flex;flex-direction:column;gap:8px}
.art-te{display:flex;gap:10px;align-items:flex-start}
.art-td{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.art-td.normal{background:var(--blue)}
.art-td.fabric{background:var(--green)}
.art-td.po{background:var(--amber)}
.art-tb{flex:1}
.art-tt{font-size:12px;color:var(--t2)}
.art-tm{font-size:11px;color:var(--t3);margin-top:1px}
.div{border:none;border-top:.5px solid var(--border);margin:14px 0}
.art-ar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.art-ss{font-size:12px;padding:6px 10px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}
.art-ni{flex:1;min-width:120px;font-size:12px;padding:6px 10px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);font-family:inherit}
.ni::placeholder{color:var(--t3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.2);padding:24px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:18px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:var(--t2);margin-bottom:5px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);font-family:inherit}
.fg textarea{resize:vertical;min-height:70px}
.art-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.art-form-row{grid-template-columns:1fr}}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:.5px solid var(--border);padding-top:16px}
.art-rb{border:.5px solid var(--border);border-radius:var(--r);padding:10px;margin-top:6px;display:flex;flex-direction:column;gap:6px;min-height:44px}
.re{display:flex;gap:6px;align-items:center}
.re input{flex:1}
.rdel{background:none;border:none;cursor:pointer;color:var(--t3);font-size:18px;padding:0 4px;line-height:1}
.rdel:hover{color:var(--red)}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--s2);color:var(--t2);cursor:pointer;border:.5px solid var(--border);font-family:inherit}
.chip.active{background:var(--abg);color:var(--amber);border-color:var(--amber)}
.signin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;text-align:center}
.signin-screen h2{font-size:22px;font-weight:600}
.signin-screen p{color:var(--t2);font-size:14px;max-width:380px}
.sync{font-size:11px;color:var(--t3)}
.sync.syncing{color:var(--amber)}
.sync.err{color:var(--red)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:13px;padding:10px 20px;border-radius:var(--rl);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.rup{display:flex;flex-direction:column;gap:8px;padding:12px 0;border-bottom:.5px solid var(--border)}
.rup:last-child{border-bottom:none}
.rup-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.run{flex:1;font-size:13px;font-weight:500}
.ruc{display:flex;gap:16px}
.rph{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.rph-thumb{position:relative;width:72px;height:72px;border-radius:var(--r);overflow:hidden;border:.5px solid var(--border)}
.rph-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.rph-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1}
.upbtn{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:var(--r);border:.5px solid var(--bmd);background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap}
.upbtn:hover{background:var(--s2)}
.upbtn input[type=file]{display:none}
.uploading{font-size:11px;color:var(--amber);margin-top:2px}
.qbox{background:var(--s2);border-radius:var(--r);padding:12px;margin-bottom:14px;border:.5px solid var(--border)}
.qbox h4{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.qlist{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.qitem{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-radius:var(--r);border:.5px solid var(--border)}
.qitem-info{flex:1;min-width:0}
.qitem-name{font-size:12px;font-weight:500;color:var(--blue);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;display:block}
.qitem-name:hover{text-decoration:underline}
.qitem-meta{font-size:11px;color:var(--t3);margin-top:1px}
.qdel{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;padding:2px 4px;flex-shrink:0}
.qdel:hover{color:var(--red)}
.qempty{font-size:12px;color:var(--t3);font-style:italic;margin-bottom:8px}
.cl2{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);cursor:pointer}
.db{font-size:13px;line-height:1.8;border:.5px solid var(--border);border-radius:var(--r);padding:16px}
.dbs{margin-bottom:16px}
.dbs:last-child{margin-bottom:0}
.dbst{font-weight:600;margin-bottom:6px}
.dbi{padding-left:14px;color:var(--t2);margin-bottom:4px}
.dbsb{padding-left:24px;color:var(--t3);font-size:12px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue);outline-offset:1px}
</style>
</head>
<body>

<div class="app" id="signinScreen">
  <div class="signin-screen">
    <div style="font-size:48px">🪟</div>
    <h2>ART Blinds Tracker</h2>
    <p>Sign in with your Advance Electronics Microsoft account to access the shared project tracker.</p>
    <button class="btn btn-primary" id="signinBtn" style="font-size:15px;padding:10px 24px">Sign in with Microsoft</button>
    <div id="signinStatus" style="font-size:13px;color:var(--t2);min-height:20px"></div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="app-header">
    <div class="app-title">ART — Blinds tracker <span id="syncStatus" class="sync">—</span></div>
    <div class="header-actions">
      <span class="user-badge" id="userBadge">—</span>
      <button class="btn" onclick="openDigest()">📧 Weekly digest</button>
      <button class="btn btn-primary" onclick="openNewProject()">+ New project</button>
      <button class="btn btn-sm" onclick="doSignOut()">Sign out</button>
    </div>
  </div>
  <div class="summary-bar" id="summaryBar"></div>
  <div class="tabs">
    <button class="tab active" id="tab-all" onclick="setTab('all')">All projects</button>
    <button class="tab" id="tab-needs-info" onclick="setTab('needs-info')">Needs information</button>
    <button class="tab" id="tab-ready" onclick="setTab('ready')">Ready to order</button>
    <button class="tab" id="tab-ordered" onclick="setTab('ordered')">Ordered</button>
  </div>
  <div class="filters" id="filterBar"></div>
  <div class="project-list" id="projectList"></div>
</div>

<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h3 id="pmTitle">New blind project</h3>
    <div class="art-form-row">
      <div class="fg"><label>Client name *</label><input id="pm-client" placeholder="e.g. Merkel"></div>
      <div class="fg"><label>Project / address</label><input id="pm-project" placeholder="e.g. FR29 LOT26 Cottage"></div>
    </div>
    <div class="art-form-row">
      <div class="fg"><label>Lead</label><select id="pm-lead"><option>Bruno</option><option>Trevor</option><option>Lyall</option></select></div>
      <div class="fg"><label>Quote type</label><select id="pm-type"><option>Lutron (Trevor quotes)</option><option>Hunter Douglas (Francisco quotes)</option><option>Mixed</option></select></div>
    </div>
    <div class="art-form-row">
      <div class="fg"><label>Mount type</label><select id="pm-mount"><option value="">Unknown</option><option>Recessed ceiling</option><option>Inside mount w/ valance</option><option>Mixed</option></select></div>
      <div class="fg"><label>Power type</label><select id="pm-power"><option value="">Unknown</option><option>Wired</option><option>Battery</option><option>Wireless</option><option>Mixed</option></select></div>
    </div>
    <div class="fg"><label>Primary fabric (e.g. main rooms)</label><input id="pm-fabric" placeholder="e.g. Mosaic Flint &lt;2% openness"></div>
    <div class="fg"><label>Secondary fabric (e.g. bedrooms / blackout)</label><input id="pm-fabric2" placeholder="e.g. Mosaic Flint Blackout 0%"></div>
    <div class="fg">
      <label>Rooms / areas</label>
      <div class="art-rb" id="roomBuilder"></div>
      <button class="btn btn-sm" style="margin-top:8px" onclick="addRoomEntry()">+ Add room</button>
    </div>
    <div class="fg">
      <label>Needs information — waiting on:</label>
      <div class="chip-row" id="needsInfoChips">
        <button class="chip" onclick="toggleChip(this)">Floor plans</button>
        <button class="chip" onclick="toggleChip(this)">Window schedule</button>
        <button class="chip" onclick="toggleChip(this)">Fabric selection</button>
        <button class="chip" onclick="toggleChip(this)">Client approval</button>
        <button class="chip" onclick="toggleChip(this)">Measurements</button>
        <button class="chip" onclick="toggleChip(this)">Builder access</button>
      </div>
    </div>
    <div class="fg"><label>Initial note</label><textarea id="pm-note" placeholder="Any context to capture..."></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('projectModal')">Cancel</button>
      <button class="btn btn-primary" id="saveProjectBtn" onclick="saveProject()">Save project</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="roomModal">
  <div class="modal">
    <h3 id="roomModalTitle">Room measurements</h3>
    <p style="font-size:12px;color:var(--t2);margin-bottom:14px">● Blue = Adrian (M1) &nbsp;·&nbsp; ● Green = Chris (M2)</p>
    <div id="roomModalContent"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('roomModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRoomMeasures()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="digestModal">
  <div class="modal" style="width:600px">
    <h3 id="digestTitle">Weekly digest</h3>
    <div id="digestContent"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal('digestModal')">Close</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js" crossorigin="anonymous"></script>
<script>
const CLIENT_ID = '7b0d92bf-6e34-497e-9938-7860ba268631';
const TENANT_ID = '2e6ff905-d709-43db-94a5-c11d318118ee';
const REDIRECT  = 'https://tsiepman.github.io/Blinds-Project-Tracker';
const SP_HOST   = 'advanceelectronics.sharepoint.com';
const SP_PATH   = '/sites/ART43';
const LIST_NAME = 'ART Blinds Tracker';
const GRAPH     = 'https://graph.microsoft.com/v1.0';
const SCOPES    = ['Sites.ReadWrite.All','User.Read'];

const STAGES = [
  {id:'meeting',        label:'Initial meeting',              pct:5  },
  {id:'waiting-info',   label:'Waiting on information',       pct:15 },
  {id:'budgetary-sent', label:'Budgetary quote sent',         pct:25 },
  {id:'quote-approved', label:'Quote approved',               pct:35 },
  {id:'waiting-fabric', label:'Waiting on fabric',            pct:45 },
  {id:'final-quote',    label:'Final quote done',             pct:55 },
  {id:'measure-1',      label:'Measurement 1 done',           pct:65 },
  {id:'measure-2',      label:'Measurement 2 done',           pct:75 },
  {id:'ready',          label:'Ready to order',               pct:85 },
  {id:'partial-order',  label:'Partially ordered',            pct:90 },
  {id:'ordered',        label:'Ordered',                      pct:95 },
  {id:'received',       label:'Received / install scheduled', pct:100},
];
const SC = {meeting:'#888780','waiting-info':'#c47c00','budgetary-sent':'#1a6bbf','quote-approved':'#1a6bbf','waiting-fabric':'#c47c00','final-quote':'#1a6bbf','measure-1':'#2a7a35','measure-2':'#2a7a35',ready:'#2d7a3a','partial-order':'#1a6bbf',ordered:'#2d7a3a',received:'#2d7a3a'};

let msalClient = null;
let projects = [], expandedId = null, activeTab = 'all', activeFilter = 'all';
let editingId = null, roomEditId = null, roomEditTemp = [];
let currentUser = null, spSiteId = null, spListId = null;

// ── Helpers ──
const stageObj  = id => STAGES.find(s=>s.id===id)||STAGES[0];
const needsInfo = p  => (p.blockers||[]).length > 0;
const isReady   = p  => p.stage==='ready'||p.stage==='ordered'||p.stage==='received'||
  (!needsInfo(p)&&!!p.fabric&&!!p.mount&&!!p.power&&p.rooms.length>0&&p.rooms.every(r=>r.m1&&r.m2));
const isOrdered = p  => p.stage==='ordered'||p.stage==='received';
const nowStr    = () => new Date().toLocaleDateString('en-CA',{year:'numeric',month:'short',day:'numeric'});
const h = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const safeJSON  = (s,f) => { try{return s?JSON.parse(s):f;}catch(e){return f;} };

function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function setSS(msg,cls=''){
  const el=document.getElementById('syncStatus');
  if(el){el.textContent=msg;el.className='sync '+cls;}
}

// ── MSAL ──
function initMsal(lib){
  msalClient = new lib.PublicClientApplication({
    auth:{clientId:CLIENT_ID,authority:`https://login.microsoftonline.com/${TENANT_ID}`,redirectUri:REDIRECT},
    cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}
  });
}

function waitForLib(cb,n=0){
  const lib = typeof msalBrowser!=='undefined'?msalBrowser:typeof msal!=='undefined'?msal:null;
  if(lib&&lib.PublicClientApplication){initMsal(lib);cb();}
  else if(n<40) setTimeout(()=>waitForLib(cb,n+1),100);
  else document.getElementById('signinStatus').textContent='Could not load auth library. Please refresh.';
}

async function checkSession(){
  try{
    const r = await msalClient.handleRedirectPromise();
    if(r){currentUser=r.account;await initApp();return;}
    const accs = msalClient.getAllAccounts();
    if(accs.length){currentUser=accs[0];await initApp();}
    else showSignIn();
  }catch(e){console.error(e);showSignIn();}
}

async function getToken(){
  const accs=msalClient.getAllAccounts();
  if(!accs.length) return null;
  try{
    const r=await msalClient.acquireTokenSilent({scopes:SCOPES,account:accs[0]});
    return r.accessToken;
  }catch(e){
    await msalClient.acquireTokenRedirect({scopes:SCOPES,account:accs[0]});
    return null;
  }
}

function showSignIn(){
  document.getElementById('signinScreen').style.display='';
  document.getElementById('mainApp').style.display='none';
}

document.getElementById('signinBtn').addEventListener('click',async()=>{
  document.getElementById('signinStatus').textContent='Redirecting to Microsoft...';
  try{ await msalClient.loginRedirect({scopes:SCOPES}); }
  catch(e){ document.getElementById('signinStatus').textContent='Error: '+e.message; }
});

function doSignOut(){ msalClient.logoutRedirect(); }

// ── Graph ──
async function gGet(url){
  const tok=await getToken();
  const r=await fetch(GRAPH+url,{headers:{Authorization:'Bearer '+tok}});
  if(!r.ok) throw new Error('GET failed '+r.status+' '+url);
  return r.json();
}
async function gPost(url,body){
  const tok=await getToken();
  const r=await fetch(GRAPH+url,{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text();throw new Error('POST failed '+r.status+' '+t);}
  return r.json();
}
async function gPatch(url,body){
  const tok=await getToken();
  const r=await fetch(GRAPH+url,{method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text();throw new Error('PATCH failed '+r.status+' '+t);}
  return r.status===204?{}:r.json();
}

// ── SharePoint ──
async function getIds(){
  if(spSiteId&&spListId) return;
  const sd=await gGet(`/sites/${SP_HOST}:${SP_PATH}`);
  spSiteId=sd.id;
  const ld=await gGet(`/sites/${spSiteId}/lists?$filter=displayName eq '${encodeURIComponent(LIST_NAME)}'`);
  if(!ld.value.length) throw new Error(`SharePoint list "${LIST_NAME}" not found.`);
  spListId=ld.value[0].id;
}

function spToP(item){
  const f=item.fields;
  return {
    id:item.id, spId:item.id,
    client:f.Client||'', project:f.Project||'—',
    lead:f.Lead||'Bruno', type:f.QuoteType||'',
    stage:f.Stage||'meeting', mount:f.Mount||'', power:f.Power||'',
    fabric:f.Fabric||'', fabric2:f.Fabric2||'', fabricBy:f.FabricBy||'', fabricDate:f.FabricDate||'',
    blockers:safeJSON(f.Blockers,[]), rooms:safeJSON(f.Rooms,[]),
    log:safeJSON(f.Log,[]), poNumber:f.PONumber||'',
    lutronQuotes:safeJSON(f.LutronQuotes,[]),
    hdQuotes:safeJSON(f.HDQuotes,[])
  };
}
function pToSp(p){
  return {
    Client:p.client, Project:p.project, Lead:p.lead, QuoteType:p.type,
    Stage:p.stage, Mount:p.mount, Power:p.power,
    Fabric:p.fabric, Fabric2:p.fabric2||'', FabricBy:p.fabricBy, FabricDate:p.fabricDate,
    Blockers:JSON.stringify(p.blockers||[]),
    Rooms:JSON.stringify(p.rooms||[]),
    Log:JSON.stringify(p.log||[]),
    PONumber:p.poNumber||'',
    LutronQuotes:JSON.stringify(p.lutronQuotes||[]),
    HDQuotes:JSON.stringify(p.hdQuotes||[])
  };
}

async function loadProjects(){
  setSS('Syncing…','syncing');
  await getIds();
  const d=await gGet(`/sites/${spSiteId}/lists/${spListId}/items?expand=fields&$top=200`);
  projects=d.value.map(spToP);
  setSS('Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  render();
}

async function saveToSp(p){
  setSS('Saving…','syncing');
  await getIds();
  if(p.spId){
    await gPatch(`/sites/${spSiteId}/lists/${spListId}/items/${p.spId}/fields`,pToSp(p));
  }else{
    const r=await gPost(`/sites/${spSiteId}/lists/${spListId}/items`,{fields:pToSp(p)});
    p.spId=r.id; p.id=r.id;
  }
  setSS('Saved '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
}

async function initApp(){
  document.getElementById('signinScreen').style.display='none';
  document.getElementById('mainApp').style.display='';
  document.getElementById('userBadge').textContent=currentUser.name||currentUser.username;
  try{ await loadProjects(); }
  catch(e){ console.error(e); setSS('Sync error','err'); toast('Could not load data: '+e.message,5000); render(); }
}

// ── Render ──
function render(){ renderSummary(); renderFilters(); renderProjects(); }

function renderSummary(){
  const ni=projects.filter(needsInfo).length;
  const rd=projects.filter(p=>isReady(p)&&!isOrdered(p)).length;
  const or=projects.filter(isOrdered).length;
  document.getElementById('summaryBar').innerHTML=
    `<div class="art-sc"><div class="art-sn">${projects.length}</div><div class="art-sl">Active</div></div>
     <div class="art-sc"><div class="art-sn" style="color:var(--amber)">${ni}</div><div class="art-sl">Needs info</div></div>
     <div class="art-sc"><div class="art-sn" style="color:var(--green)">${rd}</div><div class="art-sl">Ready to order</div></div>
     <div class="art-sc"><div class="art-sn" style="color:var(--blue)">${or}</div><div class="art-sl">Ordered</div></div>`;
}

function renderFilters(){
  const stages=['all',...new Set(projects.map(p=>p.stage))];
  document.getElementById('filterBar').innerHTML=stages.map(s=>
    `<button class="fc${s===activeFilter?' active':''}" onclick="setFilter('${s}')">${s==='all'?'All stages':stageObj(s).label}</button>`
  ).join('');
}

function getFiltered(){
  let l=[...projects];
  if(activeTab==='needs-info') l=l.filter(needsInfo);
  else if(activeTab==='ready') l=l.filter(p=>isReady(p)&&!isOrdered(p));
  else if(activeTab==='ordered') l=l.filter(isOrdered);
  if(activeFilter!=='all') l=l.filter(p=>p.stage===activeFilter);
  return l;
}

function renderProjects(){
  const list=getFiltered();
  const el=document.getElementById('projectList');
  if(!list.length){el.innerHTML='<div class="empty-state"><div style="font-size:32px">🪟</div><p>No projects match this filter.</p></div>';return;}
  el.innerHTML='';
  list.forEach((p,idx)=>{
    const div=document.createElement('div');
    div.innerHTML=buildCard(p,idx);
    el.appendChild(div.firstElementChild);
  });
}

function buildCard(p,idx){
  const st=stageObj(p.stage);
  const rdy=isReady(p)&&!isOrdered(p);
  const ord=isOrdered(p);
  const ni=needsInfo(p);

    :`<span class="badge art-bs" style="color:${SC[p.stage]}">${st.label}</span>`;

  const itags=ni?(p.blockers.map(b=>`<span class="art-it">⏳ ${h(b)}</span>`).join('')+(!p.fabric?'<span class="art-it">⏳ Fabric not confirmed</span>':'')):'';

    ?`${p.fabric?`<div class="fc2">${h(p.fabric)}</div>`:''}${p.fabric2?`<div class="fc2" style="margin-top:4px">${h(p.fabric2)}</div>`:''}
      <div class="fsrc">${p.fabricBy?'Entered by '+h(p.fabricBy)+(p.fabricDate?' · '+h(p.fabricDate):''):''}</div>`
    :`<div class="fc2 empty">Not yet confirmed</div><div class="fsrc"></div>`;

  const roomsHtml=!tot?'<div style="font-size:12px;color:var(--t3)">No rooms added yet</div>'
    :p.rooms.map(r=>{
      const pc=(r.photos||[]).length;
      return `<div class="rc"><span class="rn">${h(r.name)}</span><span class="rd"><span class="dot${r.m1?' m1':''}" title="M1 Adrian"></span><span class="dot${r.m2?' m2':''}" title="M2 Chris"></span>${pc?`<span style="font-size:10px;color:var(--blue);margin-left:2px" title="${pc} photo${pc>1?'s':''}">📷${pc}</span>`:''}  </span></div>`;
    }).join('');

  const logHtml=(p.log||[]).slice(0,6).map(e=>
    `<div class="art-te"><div class="art-art-td ${e.type||'normal'}"></div><div class="art-tb"><div class="art-tt">${h(e.text)}</div><div class="art-tm">${h(e.time)}${e.by?' · '+h(e.by):''}</div></div></div>`
  ).join('')||'<div style="font-size:12px;color:var(--t3)">No activity yet.</div>';

  const stageOpts=STAGES.map(s=>`<option value="${s.id}"${p.stage===s.id?' selected':''}>${s.label}</option>`).join('');

  return `<div class="art-pc" id="art-pc-${h(p.id)}">
  <div class="art-ch" data-pidx="${idx}" onclick="toggleCard(this)">
    <div class="art-cl">
      <div class="art-cn">${h(p.client)}${p.project&&p.project!=='—'?' — '+h(p.project):''}</div>
      <div class="art-cm">Lead: ${h(p.lead)} &nbsp;·&nbsp; ${h(p.type)}${tot?` &nbsp;·&nbsp; ${tot} rooms &nbsp; M1:${m1}/${tot} M2:${m2}/${tot}`:''}</div>
    </div>
    <div class="art-cr">${badge}<span class="chv${exp?' open':''}">⌄</span></div>
  </div>
  <div class="art-pb"><div class="art-pf" style="width:${st.pct}%"></div></div>
  <div class="dp${exp?' open':''}" id="dp-${h(p.id)}">
    <div class="art-dpi">
      ${itags?`<div class="itags">${itags}</div>`:''}
      <div class="art-fb">
        <h4>Fabric selection</h4>${fabHtml}
        <div class="fins">
          <input class="art-fi" id="fab-${h(p.id)}" placeholder="Primary fabric (main rooms)" value="${h(p.fabric||'')}">
          <input class="art-fi" id="fab2-${h(p.id)}" placeholder="Secondary fabric (bedrooms/blackout)" value="${h(p.fabric2||'')}" style="margin-top:6px;flex-basis:100%">
          <select class="art-fw" id="fabwho-${h(p.id)}"><option>Bruno</option><option>Trevor</option><option>Francisco</option><option>Designer</option><option>Client</option></select>
          <button class="btn btn-sm btn-primary" data-pidx="${idx}" onclick="saveFabric(this)">Save fabric</button>
        </div>
      </div>
      <div class="pob">
        <h4>PO Number${ord?' (Terry)':''}</h4>
        ${p.poNumber?`<div class="poc">${h(p.poNumber)}</div>`:'<div class="poc empty">Not yet assigned</div>'}
        <div class="poi">
          <input class="pi" id="po-${h(p.id)}" placeholder="Enter PO number" value="${h(p.poNumber||'')}">
          <button class="btn btn-sm btn-primary" data-pidx="${idx}" onclick="savePO(this)">Save PO</button>
        </div>
      </div>
      ${(()=>{try{return buildQuoteSection(p,idx);}catch(e){console.error("buildQuoteSection error:",e);return "";}})()}
      <div class="detail-grid">
        <div class="art-ds">
          <h4>Project details</h4>
          <div class="art-fr"><span class="art-fl">Mount type</span><span class="art-fv ${p.mount?'ok':'pend'}">${h(p.mount||'Not confirmed')}</span></div>
          <div class="art-fr"><span class="art-fl">Power type</span><span class="art-fv ${p.power?'ok':'pend'}">${h(p.power||'Not confirmed')}</span></div>
          <div class="art-fr"><span class="art-fl">Quote type</span><span class="art-fv">${h(p.type)}</span></div>
          <div class="art-fr"><span class="art-fl">Lead</span><span class="art-fv">${h(p.lead)}</span></div>
        </div>
        <div class="art-ds">
          <h4>Measurements</h4>
          <div class="art-fr"><span class="art-fl">M1 — Adrian</span><span class="art-fv ${m1===tot&&tot?'ok':'pend'}">${tot?m1+'/'+tot+' rooms':'No rooms yet'}</span></div>
          <div class="art-fr"><span class="art-fl">M2 — Chris</span><span class="art-fv ${m2===tot&&tot?'ok':'pend'}">${tot?m2+'/'+tot+' rooms':'No rooms yet'}</span></div>
          <div style="margin-top:10px;font-size:11px;color:var(--t3)">● Blue = Adrian &nbsp;·&nbsp; ● Green = Chris</div>
        </div>
      </div>
      <div class="art-rs">
        <h4>Rooms</h4>
        <div class="rg">${roomsHtml}</div>
        <button class="btn btn-sm" data-pidx="${idx}" onclick="openRoomModal(this)">Update room measurements</button>
      </div>
      <div class="tl">
        <h4>Activity log</h4>
        <div class="tle">${logHtml}</div>
      </div>
      <hr class="div">
      <div class="art-ar">
        <select class="art-ss" data-pidx="${idx}" onchange="updateStage(this)">
          ${stageOpts}
        </select>
        <input class="art-ni" id="note-${h(p.id)}" placeholder="Add a note...">
        <button class="btn btn-sm" data-pidx="${idx}" onclick="addNote(this)">Log note</button>
        <button class="btn btn-sm" data-pidx="${idx}" onclick="openEditProject(this)">Edit</button>
      </div>
      <div class="art-ar" style="margin-top:8px">
        <button class="btn btn-sm" data-pidx="${idx}" onclick="doSearchEmails(this)">🔍 Search emails for updates</button>
        <button class="btn btn-sm" data-pidx="${idx}" onclick="doDraftEmail(this)">✉ Draft follow-up email</button>
      </div>
    </div>
  </div>
</div>`;

// ── Get project from element ──
function pFromEl(el){
  const idx=parseInt(el.getAttribute('data-pidx'));
  return getFiltered()[idx];
}

// ── Interactions ──
function toggleCard(el){
  const idx=parseInt(el.getAttribute('data-pidx'));
  const p=getFiltered()[idx];
  if(!p) return;
  expandedId=String(expandedId)===String(p.id)?null:p.id;
  render();
}

function setTab(tab){
  activeTab=tab; activeFilter='all';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}
function setFilter(f){ activeFilter=f; render(); }

async function updateStage(el){
  const p=pFromEl(el); if(!p) return;
  const old=stageObj(p.stage).label;
  p.stage=el.value;
  p.log=p.log||[];
  p.log.unshift({text:`Stage: ${old} → ${stageObj(p.stage).label}`,time:nowStr(),type:'normal',by:currentUser?.name||''});
  render();
  try{await saveToSp(p);toast('Stage updated ✓');}catch(e){toast('Save failed: '+e.message,4000);}
}

async function addNote(el){
  const p=pFromEl(el); if(!p) return;
  const inp=document.getElementById('note-'+p.id);
  if(!inp||!inp.value.trim()) return;
  p.log=p.log||[];
  p.log.unshift({text:inp.value.trim(),time:nowStr(),type:'normal',by:currentUser?.name||''});
  inp.value=''; render();
  try{await saveToSp(p);toast('Note saved ✓');}catch(e){toast('Save failed: '+e.message,4000);}
}

async function saveFabric(el){
  const p=pFromEl(el); if(!p) return;
  const fab=document.getElementById('fab-'+p.id);
  const who=document.getElementById('fabwho-'+p.id);
  if(!fab||!fab.value.trim()){toast('Please enter a fabric name.');return;}
  p.fabric=fab.value.trim();
  const fab2=document.getElementById('fab2-'+p.id); if(fab2) p.fabric2=fab2.value.trim();
  p.fabricBy=who.value; p.fabricDate=nowStr();
  p.blockers=(p.blockers||[]).filter(b=>b!=='Fabric selection');
  p.log=p.log||[];
  p.log.unshift({text:`Fabric updated: ${p.fabric}`,time:nowStr(),by:who.value,type:'fabric'});
  render();
  try{await saveToSp(p);toast('Fabric saved ✓');}catch(e){toast('Save failed: '+e.message,4000);}
}

async function savePO(el){
  const p=pFromEl(el); if(!p) return;
  const inp=document.getElementById('po-'+p.id);
  if(!inp||!inp.value.trim()){toast('Please enter a PO number.');return;}
  p.poNumber=inp.value.trim();
  p.log=p.log||[];
  p.log.unshift({text:`PO entered: ${p.poNumber}`,time:nowStr(),by:currentUser?.name||'',type:'po'});
  if(!isOrdered(p)) p.stage='ordered';
  render();
  try{await saveToSp(p);toast('PO saved ✓');}catch(e){toast('Save failed: '+e.message,4000);}
}

// ── Quote upload ──
const QUOTE_FOLDER = 'Blinds Quotes';

async function ensureQuoteFolder(){
  try{ await gGet(`/sites/${spSiteId}/drive/root:/${QUOTE_FOLDER}`); }
  catch(e){
    await gPost(`/sites/${spSiteId}/drive/root/children`,{
      name:QUOTE_FOLDER, folder:{}, '@microsoft.graph.conflictBehavior':'rename'
    });
  }
}

async function uploadQuote(file, projectClient, quoteType){
  await getIds();
  await ensureQuoteFolder();
  const ts = new Date().toISOString().slice(0,10);
  const safe = s => s.replace(/[^a-zA-Z0-9]/g,'-');
  const filename = `${safe(projectClient)}-${safe(quoteType)}-${ts}-${Date.now()}.pdf`;
  const tok = await getToken();
  const url = `${GRAPH}/sites/${spSiteId}/drive/root:/${QUOTE_FOLDER}/${filename}:/content`;
  const res = await fetch(url,{
    method:'PUT',
    headers:{Authorization:'Bearer '+tok,'Content-Type':'application/pdf'},
    body:file
  });
  if(!res.ok){const t=await res.text();throw new Error('Upload failed: '+t);}
  const data = await res.json();
  const linkRes = await gPost(`/sites/${spSiteId}/drive/items/${data.id}/createLink`,{
    type:'view', scope:'organization'
  });
  return {
    name: file.name,
    url: linkRes.link.webUrl,
    id: data.id,
    uploadedBy: currentUser?.name||'',
    uploadedAt: nowStr()
  };
}

function buildQuoteSection(p, idx){
  function quoteList(quotes, type){
    const items = (quotes||[]).map((q,qi)=>
      `<div class="qitem">
        <div class="qitem-info">
          <a class="qitem-name" href="${h(q.url)}" target="_blank" title="${h(q.name)}">${h(q.name)}</a>
          <div class="qitem-meta">${h(q.uploadedAt)} · ${h(q.uploadedBy)}</div>
        </div>
        <button class="qdel" data-pidx="${idx}" data-type="${type}" data-qi="${qi}" onclick="deleteQuote(this)" title="Remove">🗑</button>
      </div>`
    ).join('');
    return `${items||'<div class="qempty">No quote uploaded yet</div>'}
      <label class="upbtn" style="margin-top:4px">
        📄 Upload ${type} quote
        <input type="file" accept=".pdf,application/pdf" onchange="handleQuoteUpload(this,'${type}',${idx})" style="display:none">
      </label>
      <div class="uploading" id="qupl-${type}-${h(p.id)}" style="display:none">Uploading…</div>`;
  }
  return `<div class="qbox">
    <h4>Lutron quote</h4>
    ${quoteList(p.lutronQuotes,'Lutron')}
  </div>
  <div class="qbox">
    <h4>Hunter Douglas quote</h4>
    ${quoteList(p.hdQuotes,'HunterDouglas')}
  </div>`;
}

async function handleQuoteUpload(input, type, idx){
  const p = getFiltered()[idx]; if(!p||!input.files.length) return;
  const statusEl = document.getElementById(`qupl-${type}-${p.id}`);
  if(statusEl) statusEl.style.display='block';
  try{
    const q = await uploadQuote(input.files[0], p.client, type);
    if(type==='Lutron') p.lutronQuotes=[...(p.lutronQuotes||[]),q];
    else p.hdQuotes=[...(p.hdQuotes||[]),q];
    p.log.unshift({text:`${type} quote uploaded: ${q.name}`,time:nowStr(),by:currentUser?.name||'',type:'normal'});
    toast('Quote uploaded ✓');
    await saveToSp(p);
    render();
  }catch(e){
    toast('Upload failed: '+e.message,4000);
    console.error(e);
  }finally{
    if(statusEl) statusEl.style.display='none';
    input.value='';
  }
}

async function deleteQuote(btn){
  const idx=parseInt(btn.getAttribute('data-pidx'));
  const type=btn.getAttribute('data-type');
  const qi=parseInt(btn.getAttribute('data-qi'));
  const p=getFiltered()[idx]; if(!p) return;
  if(!confirm('Remove this quote?')) return;
  if(type==='Lutron') p.lutronQuotes=(p.lutronQuotes||[]).filter((_,i)=>i!==qi);
  else p.hdQuotes=(p.hdQuotes||[]).filter((_,i)=>i!==qi);
  p.log.unshift({text:`${type} quote removed.`,time:nowStr(),by:currentUser?.name||'',type:'normal'});
  try{ await saveToSp(p); toast('Quote removed ✓'); }catch(e){ toast('Save failed: '+e.message,4000); }
  render();
}

async function uploadPhoto(file, projectClient, roomName) {
  await getIds();

  const ts = new Date().toISOString().slice(0,10);
  const safe = s => s.replace(/[^a-zA-Z0-9]/g,'-');
  const filename = `${safe(projectClient)}-${safe(roomName)}-${ts}-${Date.now()}${file.name.match(/\.[^.]+$/)?.[0]||'.jpg'}`;
  const tok = await getToken();
  const url = `${GRAPH}/sites/${spSiteId}/drive/root:/${PHOTO_FOLDER}/${filename}:/content`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: 'Bearer '+tok, 'Content-Type': file.type||'image/jpeg' },
    body: file
  });
  if (!res.ok) { const t=await res.text(); throw new Error('Upload failed: '+t); }
  const data = await res.json();
  // Get sharing link
  const linkRes = await gPost(`/sites/${spSiteId}/drive/items/${data.id}/createLink`, {
    type: 'view', scope: 'organization'
  });
  return { name: filename, url: linkRes.link.webUrl, id: data.id };
}

function renderRoomPhotos(i) {
  const r = roomEditTemp[i];
  const photos = r.photos||[];
  const thumbs = photos.map((ph,pi) =>
    `<div class="rph-thumb">
      <img src="${h(ph.url)}" onclick="window.open('${h(ph.url)}','_blank')" title="${h(ph.name)}">
      <button class="rph-del" onclick="removePhoto(${i},${pi})" title="Remove">×</button>
    </div>`
  ).join('');
  return `<div class="rph" id="rph-${i}">${thumbs}</div>
    <div class="uploading" id="upl-${i}" style="display:none">Uploading…</div>`;
}

function removePhoto(roomIdx, photoIdx) {
  roomEditTemp[roomIdx].photos = (roomEditTemp[roomIdx].photos||[]).filter((_,i)=>i!==photoIdx);
  // Re-render just the photo section
  document.getElementById('rph-'+roomIdx).outerHTML = renderRoomPhotos(roomIdx).split('<div class="uploading"')[0];
}

async function handlePhotoUpload(input, roomIdx) {
  const p = projects.find(x=>String(x.id)===String(roomEditId));
  if (!p||!input.files.length) return;
  const statusEl = document.getElementById('upl-'+roomIdx);
  if (statusEl) statusEl.style.display='block';
  try {
    for (const file of input.files) {
      const ph = await uploadPhoto(file, p.client, roomEditTemp[roomIdx].name);
      roomEditTemp[roomIdx].photos = roomEditTemp[roomIdx].photos||[];
      roomEditTemp[roomIdx].photos.push(ph);
      // Re-render photo strip
      const strip = document.getElementById('rph-'+roomIdx);
      if (strip) {
        const thumb = document.createElement('div');
        thumb.className='rph-thumb';
        thumb.innerHTML=`<img src="${h(ph.url)}" onclick="window.open('${h(ph.url)}','_blank')" title="${h(ph.name)}">
          <button class="rph-del" onclick="removePhoto(${roomIdx},${(roomEditTemp[roomIdx].photos.length-1)})" title="Remove">×</button>`;
        strip.appendChild(thumb);
      }
    }
    toast('Photo uploaded ✓');
  } catch(e) {
    toast('Upload failed: '+e.message, 4000);
    console.error(e);
  } finally {
    if (statusEl) statusEl.style.display='none';
    input.value='';
  }
}

function openRoomModal(el){
  const p=pFromEl(el); if(!p) return;
  roomEditId=p.id;
  roomEditTemp=p.rooms.map(r=>({...r, photos:[...(r.photos||[])]}));
  document.getElementById('roomModalTitle').textContent='Room measurements — '+p.client;
  document.getElementById('roomModalContent').innerHTML=roomEditTemp.length
    ?roomEditTemp.map((r,i)=>`<div class="rup">
        <div class="rup-top">
          <span class="run">${h(r.name)}</span>
          <div class="ruc">
            <label class="cl2"><input type="checkbox" ${r.m1?'checked':''} onchange="roomEditTemp[${i}].m1=this.checked"> M1 Adrian</label>
            <label class="cl2"><input type="checkbox" ${r.m2?'checked':''} onchange="roomEditTemp[${i}].m2=this.checked"> M2 Chris</label>
          </div>
          <label class="upbtn" title="Attach photo">
            📷 Add photo
            <input type="file" accept="image/*" multiple onchange="handlePhotoUpload(this,${i})">
          </label>
        </div>
        ${renderRoomPhotos(i)}
      </div>`).join('')
    :'<p style="font-size:13px;color:var(--t2)">No rooms on this project yet. Edit the project first.</p>';
  document.getElementById('roomModal').classList.add('open');
}

async function saveRoomMeasures(){
  const p=projects.find(x=>String(x.id)===String(roomEditId)); if(!p) return;
  p.rooms=roomEditTemp;
  const allM1=p.rooms.every(r=>r.m1), allM2=p.rooms.every(r=>r.m2);
  if(allM1&&!(p.log||[]).some(e=>e.text.startsWith('All M1')))
    p.log.unshift({text:'All M1 measurements confirmed (Adrian)',time:nowStr(),type:'normal'});
  if(allM2&&!(p.log||[]).some(e=>e.text.startsWith('All M2')))
    p.log.unshift({text:'All M2 measurements confirmed (Chris)',time:nowStr(),type:'normal'});
  closeModal('roomModal'); render();
  try{await saveToSp(p);toast('Measurements saved ✓');}catch(e){toast('Save failed: '+e.message,4000);}
}

// ── New/Edit project ──
function openNewProject(){
  editingId=null;
  document.getElementById('pmTitle').textContent='New blind project';
  document.getElementById('saveProjectBtn').textContent='Save project';
  clearForm(); addRoomEntry();
  document.getElementById('projectModal').classList.add('open');
}

function openEditProject(el){
  const p=pFromEl(el); if(!p) return;
  editingId=p.id;
  document.getElementById('pmTitle').textContent='Edit — '+p.client;
  document.getElementById('saveProjectBtn').textContent='Update project';
  clearForm();
  document.getElementById('pm-client').value=p.client||'';
  document.getElementById('pm-project').value=p.project!=='—'?(p.project||''):'';
  document.getElementById('pm-lead').value=p.lead||'Bruno';
  document.getElementById('pm-type').value=p.type||'';
  document.getElementById('pm-mount').value=p.mount||'';
  document.getElementById('pm-power').value=p.power||'';
  document.getElementById('pm-fabric').value=p.fabric||'';
  const f2el=document.getElementById('pm-fabric2'); if(f2el) f2el.value=p.fabric2||'';
  const rb=document.getElementById('roomBuilder'); rb.innerHTML='';
  (p.rooms||[]).forEach(r=>addRoomEntry(r.name));
  if(!(p.rooms||[]).length) addRoomEntry();
  document.querySelectorAll('#needsInfoChips .chip').forEach(c=>{
    if((p.blockers||[]).includes(c.textContent.trim())) c.classList.add('active');
  });
  document.getElementById('projectModal').classList.add('open');
}

function clearForm(){
  ['pm-client','pm-project','pm-fabric','pm-fabric2','pm-note','pm-mount','pm-power'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.querySelectorAll('#needsInfoChips .chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('roomBuilder').innerHTML='';
}

function addRoomEntry(name=''){
  const rb=document.getElementById('roomBuilder');
  const d=document.createElement('div'); d.className='re';
  d.innerHTML=`<input placeholder="Room name e.g. Living room" value="${h(name)}"><button class="rdel" onclick="this.parentElement.remove()">×</button>`;
  rb.appendChild(d);
}

function toggleChip(el){ el.classList.toggle('active'); }

async function saveProject(){
  const client=(document.getElementById('pm-client').value||'').trim();
  if(!client){toast('Please enter a client name.');return;}
  const blockers=[...document.querySelectorAll('#needsInfoChips .chip.active')].map(c=>c.textContent.trim());
  const roomNames=[...document.querySelectorAll('#roomBuilder .re input')].map(i=>i.value.trim()).filter(Boolean);
  const note=(document.getElementById('pm-note').value||'').trim();
  const fabric=(document.getElementById('pm-fabric').value||'').trim();
  const fabric2=(document.getElementById('pm-fabric2').value||'').trim();

  if(editingId){
    const p=projects.find(x=>String(x.id)===String(editingId)); if(!p) return;
    p.rooms=roomNames.map(name=>{const ex=p.rooms.find(r=>r.name===name);return ex?ex:{name,m1:false,m2:false};});
    p.client=client;
    p.project=(document.getElementById('pm-project').value||'').trim()||'—';
    p.lead=document.getElementById('pm-lead').value;
    p.type=document.getElementById('pm-type').value;
    p.mount=document.getElementById('pm-mount').value;
    p.power=document.getElementById('pm-power').value;
    if(fabric&&fabric!==p.fabric){p.fabric=fabric;p.fabricBy='Trevor';p.fabricDate=nowStr();p.log.unshift({text:`Fabric updated: ${fabric}`,time:nowStr(),by:'Trevor',type:'fabric'});}
    if(fabric2!==undefined) p.fabric2=fabric2;
    p.blockers=blockers;
    if(note) p.log.unshift({text:note,time:nowStr(),type:'normal',by:currentUser?.name||''});
    p.log.unshift({text:'Project updated.',time:nowStr(),type:'normal',by:currentUser?.name||''});
    closeModal('projectModal'); render();
    try{await saveToSp(p);toast('Project updated ✓');}catch(e){toast('Save failed: '+e.message,4000);}
  }else{
    const log=[];
    if(note) log.push({text:note,time:nowStr(),type:'normal',by:currentUser?.name||''});
    log.push({text:'Project created.',time:nowStr(),type:'normal',by:currentUser?.name||''});
    const p={id:'new-'+Date.now(),spId:null,client,project:(document.getElementById('pm-project').value||'').trim()||'—',lead:document.getElementById('pm-lead').value,type:document.getElementById('pm-type').value,stage:blockers.length?'waiting-info':'meeting',mount:document.getElementById('pm-mount').value,power:document.getElementById('pm-power').value,fabric,fabric2,fabricBy:fabric?'Trevor':'',fabricDate:fabric?nowStr():'',blockers,rooms:roomNames.map(name=>({name,m1:false,m2:false})),log,poNumber:''};
    projects.unshift(p);
    closeModal('projectModal'); render();
    try{await saveToSp(p);toast('Project created ✓');}catch(e){toast('Save failed: '+e.message,4000);}
  }
}

// ── Email handoff ──
function doSearchEmails(el){
  const p=pFromEl(el); if(!p) return;
  const waiting=p.blockers.length?p.blockers.join(', '):'any updates';
  const prompt=`Search my emails for the ${p.client} ${p.project!=='—'?p.project+' ':''}blinds project. Look for: ${waiting}${!p.fabric?', fabric selection':''}. Report what you find and flag anything I should act on.`;
  navigator.clipboard.writeText(prompt).then(()=>toast('Prompt copied — paste into Claude chat ✓')).catch(()=>window.prompt('Copy this:',prompt));
}

function doDraftEmail(el){
  const p=pFromEl(el); if(!p) return;
  const prompt=`Draft a follow-up email for the ${p.client}${p.project!=='—'?' '+p.project:''} blinds project. Stage: ${stageObj(p.stage).label}. Needs info: ${p.blockers.length?p.blockers.join(', '):'none'}. Fabric: ${p.fabric||'not confirmed'}. Mount: ${p.mount||'unknown'}. Power: ${p.power||'unknown'}.`;
  navigator.clipboard.writeText(prompt).then(()=>toast('Prompt copied — paste into Claude chat ✓')).catch(()=>window.prompt('Copy this:',prompt));
}

// ── Digest ──
function openDigest(){
  const ni=projects.filter(needsInfo);
  const rdy=projects.filter(p=>isReady(p)&&!isOrdered(p));
  const inp=projects.filter(p=>!needsInfo(p)&&!isReady(p)&&!isOrdered(p));
  const ord=projects.filter(isOrdered);
  const today=new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'});
  let html=`<div style="font-size:13px;color:var(--t2);margin-bottom:12px">To: Trevor, Bruno, Terry &nbsp;·&nbsp; ${today}</div><div class="db">`;
  if(rdy.length){html+=`<div class="dbs"><div class="dbst" style="color:var(--green)">✅ Ready to order (${rdy.length})</div>`;rdy.forEach(x=>{html+=`<div class="dbi">· ${h(x.client)} — ${h(x.project)}</div>`});html+=`</div>`;}
  if(ni.length){html+=`<div class="dbs"><div class="dbst" style="color:var(--amber)">⚠️ Needs information (${ni.length})</div>`;ni.forEach(x=>{html+=`<div class="dbi"><strong>${h(x.client)} — ${h(x.project)}</strong></div>`;x.blockers.forEach(b=>{html+=`<div class="dbsb">→ ${h(b)}</div>`});if(!x.fabric)html+=`<div class="dbsb">→ Fabric not confirmed</div>`});html+=`</div>`;}
  if(inp.length){html+=`<div class="dbs"><div class="dbst">🔄 In progress (${inp.length})</div>`;inp.forEach(x=>{html+=`<div class="dbi">· ${h(x.client)} — ${h(x.project)} <span style="color:var(--t3)">(${stageObj(x.stage).label})</span></div>`});html+=`</div>`;}
  if(ord.length){html+=`<div class="dbs"><div class="dbst" style="color:var(--blue)">📦 Ordered (${ord.length})</div>`;ord.forEach(x=>{html+=`<div class="dbi">· ${h(x.client)} — ${h(x.project)}${x.poNumber?' (PO: '+h(x.poNumber)+')':''}</div>`});html+=`</div>`;}
  if(!projects.length) html+=`<div style="color:var(--t3)">No active projects.</div>`;
  html+=`</div>`;
  document.getElementById('digestTitle').textContent='Weekly digest';
  document.getElementById('digestContent').innerHTML=html;
  document.getElementById('digestModal').classList.add('open');
}

// ── Modals ──
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'))});

// ── Boot ──
function boot(){
  waitForLib(checkSession);
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
